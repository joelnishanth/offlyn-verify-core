  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Offlyn Verify Core Architecture</text>
  <text x="480" y="54" text-anchor="middle" fill="#94a3b8" font-size="11">Hardware-rooted actuation-boundary enforcement for AI-controlled robots</text>

  <!-- Domain: Untrusted -->
  <rect x="268" y="72" width="424" height="108" rx="8" fill="#0a0817" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="282" y="88" fill="#475569" font-size="9" font-weight="600" letter-spacing="0.08em">UNTRUSTED DOMAIN</text>

  <!-- Domain: Trusted -->
  <rect x="268" y="528" width="424" height="108" rx="8" fill="#0a0817" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="282" y="544" fill="#475569" font-size="9" font-weight="600" letter-spacing="0.08em">TRUSTED DOMAIN</text>

  <!-- Boundary: ABEP -->
  <rect x="42" y="198" width="876" height="318" rx="10" fill="#080613" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="10 6"/>
  <text x="56" y="216" fill="#475569" font-size="9" font-weight="600" letter-spacing="0.08em">ACTUATION BOUNDARY (ABEP)</text>

  <!-- Arrows -->
  <path d="M 480 153 L 480 278" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>
  <text x="488" y="218" fill="#94a3b8" font-size="9" font-weight="500">action request</text>

  <path d="M 262 339 L 328 324" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#ae)"/>
  <text x="268" y="318" fill="#34d399" font-size="9" font-weight="600">signed rules</text>

  <path d="M 632 308 L 718 251" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>
  <path d="M 632 340 L 718 396" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>

  <path d="M 480 370 L 480 443" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#ae)"/>
  <text x="488" y="408" fill="#34d399" font-size="9" font-weight="600">ALLOW</text>

  <path d="M 480 493 L 480 553" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#ae)"/>
  <text x="488" y="526" fill="#34d399" font-size="9" font-weight="600">authorized command</text>

  <path d="M 350 282 Q 280 230 380 153" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#as)"/>
  <text x="288" y="208" fill="#fb7185" font-size="9" font-weight="600">DENY + reason</text>

  <path d="M 614 126 Q 830 290 640 538" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="730" y1="340" x2="746" y2="356" stroke="#fb7185" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="746" y1="340" x2="730" y2="356" stroke="#fb7185" stroke-width="2.5" stroke-linecap="round"/>
  <text x="752" y="352" fill="#fb7185" font-size="10" font-weight="700" letter-spacing="0.08em">BLOCKED</text>

  <!-- AI Planner -->
  <rect x="348" y="94" width="264" height="58" rx="6" fill="#101c26" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="118" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">AI Planner / LLM</text>
  <text x="480" y="136" text-anchor="middle" fill="#94a3b8" font-size="10">Proposes robot actions</text>

  <!-- Signed Policy -->
  <rect x="68" y="310" width="194" height="58" rx="6" fill="#043021" stroke="#34d399" stroke-width="1.5"/>
  <text x="165" y="334" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Signed Policy</text>
  <text x="165" y="352" text-anchor="middle" fill="#94a3b8" font-size="10">Ed25519 capsule</text>

  <!-- Verify Core Gate -->
  <rect x="328" y="278" width="304" height="92" rx="6" fill="#371020" stroke="#fb7185" stroke-width="1.5"/>
  <text x="480" y="312" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Verify Core Gate</text>
  <text x="480" y="332" text-anchor="middle" fill="#94a3b8" font-size="10">Deterministic - Fail-closed</text>
  <text x="480" y="348" text-anchor="middle" fill="#94a3b8" font-size="10">Signed policy - Bounds - Replay cache</text>

  <!-- Replay Cache -->
  <rect x="718" y="225" width="182" height="52" rx="6" fill="#20153f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="809" y="246" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Replay Cache</text>
  <text x="809" y="262" text-anchor="middle" fill="#94a3b8" font-size="10">Token reuse prevention</text>

  <!-- Audit Log -->
  <rect x="718" y="370" width="182" height="52" rx="6" fill="#20153f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="809" y="391" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Audit Log</text>
  <text x="809" y="407" text-anchor="middle" fill="#94a3b8" font-size="10">Hash-chained JSONL</text>

  <!-- Auth Token -->
  <rect x="405" y="443" width="150" height="50" rx="6" fill="#261511" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="480" y="464" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Auth Token</text>
  <text x="480" y="480" text-anchor="middle" fill="#94a3b8" font-size="10">Short-lived, action-bound</text>

  <!-- Robot Actuator -->
  <rect x="348" y="553" width="264" height="58" rx="6" fill="#043021" stroke="#34d399" stroke-width="1.5"/>
  <text x="480" y="577" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Robot Actuator</text>
  <text x="480" y="595" text-anchor="middle" fill="#94a3b8" font-size="10">Validates token before executing</text>

  <!-- Legend -->
  <rect x="80" y="635" width="12" height="12" rx="2" fill="#101c26" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="98" y="645" fill="#94a3b8" font-size="9">External</text>
  <rect x="170" y="635" width="12" height="12" rx="2" fill="#371020" stroke="#fb7185" stroke-width="1.5"/>
  <text x="188" y="645" fill="#94a3b8" font-size="9">Security Gate</text>
  <rect x="290" y="635" width="12" height="12" rx="2" fill="#043021" stroke="#34d399" stroke-width="1.5"/>
  <text x="308" y="645" fill="#94a3b8" font-size="9">Trusted Component</text>
  <rect x="440" y="635" width="12" height="12" rx="2" fill="#20153f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="458" y="645" fill="#94a3b8" font-size="9">Data Store</text>
  <rect x="550" y="635" width="12" height="12" rx="2" fill="#261511" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="568" y="645" fill="#94a3b8" font-size="9">Token</text>
  <line x1="626" y1="641" x2="656" y2="641" stroke="#34d399" stroke-width="1.5" marker-end="url(#ae)"/>
  <text x="662" y="645" fill="#94a3b8" font-size="9">Allow Path</text>
  <line x1="740" y1="641" x2="770" y2="641" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#as)"/>
  <text x="776" y="645" fill="#94a3b8" font-size="9">Deny / Blocked</text>

  <text x="480" y="674" text-anchor="middle" fill="#94a3b8" font-size="10">offlyn.ai - github.com/joelnishanth/offlyn-verify-core</text>
</svg>
