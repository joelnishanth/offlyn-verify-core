<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="680" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Offlyn Verify Core  Actuation Boundary Architecture</text>

  <!-- Untrusted Domain background -->
  <rect x="40" y="56" width="640" height="110" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="60" y="76" font-size="11" font-weight="600" fill="#92400e" text-transform="uppercase" letter-spacing="1">UNTRUSTED DOMAIN</text>

  <!-- AI Planner box -->
  <rect x="220" y="86" width="280" height="64" rx="8" fill="#f97316" filter="url(#shadow)"/>
  <text x="360" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">AI Planner / LLM</text>
  <text x="360" y="134" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Proposes robot actions</text>

  <!-- Arrow: Planner Æ Action Request -->
  <line x1="360" y1="150" x2="360" y2="188" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="372" y="176" font-size="10" fill="#6b7280" font-style="italic">action request</text>

  <!-- Action Request box -->
  <rect x="220" y="190" width="280" height="44" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">Canonical Action Request</text>

  <!-- Arrow: Request Æ Gate -->
  <line x1="360" y1="234" x2="360" y2="270" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Actuation Boundary background -->
  <rect x="40" y="272" width="640" height="220" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="60" y="292" font-size="11" font-weight="600" fill="#991b1b" text-transform="uppercase" letter-spacing="1">ACTUATION BOUNDARY (ABEP)</text>

  <!-- Verify Core Gate box -->
  <rect x="190" y="302" width="340" height="80" rx="8" fill="#dc2626" filter="url(#shadow)"/>
  <text x="360" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Verify Core Gate</text>
  <text x="360" y="350" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Signed policy check À Bounds check À Replay cache</text>
  <text x="360" y="366" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Deterministic À Fail-closed À Audited</text>

  <!-- Signed Policy Capsule -->
  <rect x="56" y="316" width="120" height="52" rx="6" fill="#16a34a" filter="url(#shadow)"/>
  <text x="116" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Signed Policy</text>
  <text x="116" y="356" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">Capsule</text>
  <line x1="176" y1="342" x2="188" y2="342" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- Replay Cache -->
  <rect x="544" y="302" width="120" height="44" rx="6" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="604" y="329" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Replay Cache</text>
  <line x1="530" y1="330" x2="542" y2="330" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Audit Log -->
  <rect x="544" y="358" width="120" height="44" rx="6" fill="#0891b2" filter="url(#shadow)"/>
  <text x="604" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Audit Log</text>
  <line x1="530" y1="378" x2="542" y2="378" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Decision outputs from gate -->
  <!-- ALLOW arrow down -->
  <line x1="310" y1="382" x2="310" y2="430" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowhead-green)"/>
  <text x="240" y="412" font-size="10" font-weight="600" fill="#16a34a">ALLOW + token</text>

  <!-- DENY arrow left+up back to planner -->
  <path d="M 410 382 L 410 418 Q 410 430 422 430 L 630 430 Q 644 430 644 418 L 644 118 Q 644 106 632 106 L 502 106" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowhead-red)"/>
  <text x="648" y="280" font-size="10" font-weight="600" fill="#dc2626" transform="rotate(-90 648 280)">DENY + reason</text>

  <!-- Authorization Token box -->
  <rect x="220" y="432" width="180" height="44" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="310" y="459" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Authorization Token</text>

  <!-- Arrow: Token Æ Actuator -->
  <line x1="310" y1="476" x2="310" y2="510" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- Trusted Domain background -->
  <rect x="40" y="512" width="640" height="110" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="60" y="532" font-size="11" font-weight="600" fill="#065f46" text-transform="uppercase" letter-spacing="1">TRUSTED DOMAIN</text>

  <!-- Robot Actuator box -->
  <rect x="200" y="542" width="320" height="64" rx="8" fill="#2563eb" filter="url(#shadow)"/>
  <text x="360" y="570" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Robot Actuator</text>
  <text x="360" y="590" text-anchor="middle" font-size="11" fill="#fff" opacity="0.9">Validates token before executing</text>

  <!-- BLOCKED: Direct bypass path -->
  <line x1="140" y1="150" x2="140" y2="574" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.6"/>
  <line x1="140" y1="574" x2="198" y2="574" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.6"/>

  <!-- X mark on blocked path -->
  <circle cx="140" cy="370" r="16" fill="#dc2626" opacity="0.9"/>
  <text x="140" y="376" text-anchor="middle" font-size="16" font-weight="700" fill="#fff"></text>
  <text x="92" y="404" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">DIRECT</text>
  <text x="92" y="416" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">BYPASS</text>
  <text x="92" y="428" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">BLOCKED</text>

  <!-- Footer -->
  <text x="360" y="654" text-anchor="middle" font-size="10" fill="#9ca3af">Offlyn Verify Core À github.com/joelnishanth/offlyn-verify-core</text>
  <text x="360" y="670" text-anchor="middle" font-size="9" fill="#d1d5db">Software prototype of a hardware-rooted actuation-boundary enforcement architecture</text>
</svg>
